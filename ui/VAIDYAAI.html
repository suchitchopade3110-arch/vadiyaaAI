<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VAIDYAA AI — Medical Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:       #f5faf6;
    --bg-surface:    #ffffff;
    --bg-elevated:   oklch(0.96 0.04 145);
    --bg-hover:      oklch(0.93 0.06 145);
    --border:        oklch(0.87 0.015 145);
    --border-strong: oklch(0.82 0.016 145);
    --text-primary:  oklch(0.18 0.02 145);
    --text-secondary:oklch(0.38 0.02 145);
    --text-muted:    oklch(0.58 0.01 145);
    --accent:        oklch(0.46 0.19 145);
    --green-dark:    oklch(0.92 0.08 145);
    --green-light:   oklch(0.88 0.08 145);
    --green-pale:    oklch(0.96 0.04 145);
    --font-sans: 'DM Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  html, body { height: 100%; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  @keyframes fade-in-out {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes slide-in-right {
    from { transform: translateX(30px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  button { font-family: var(--font-sans); }
  input, textarea { font-family: var(--font-sans); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="report-qr-widget.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="claim-verifier.jsx"></script>
<script type="text/babel" src="report-analyzer.jsx"></script>
<script type="text/babel" src="image-analysis.jsx"></script>
<script type="text/babel" src="job-tracker.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 195,
  "sidebarCompact": false,
  "showDisclaimer": true
}/*EDITMODE-END*/;

const NAV = [
  { id: 'dashboard', icon: '⊞',  label: 'Dashboard'    },
  { id: 'claim',     icon: '◎',  label: 'Claim Verifier' },
  { id: 'report',    icon: '▤',  label: 'Report Analyzer' },
  { id: 'image',     icon: '⬡',  label: 'Image Analysis' },
  { id: 'jobs',      icon: '≡',  label: 'Job Tracker'   },
];

function Sidebar({ active, onNavigate, compact }) {
  return (
    <aside style={{
      width: compact ? '60px' : '220px', flexShrink: 0,
      background: 'var(--green-dark)', borderRight: '1px solid oklch(0.85 0.08 145)',
      display: 'flex', flexDirection: 'column', height: '100vh',
      position: 'sticky', top: 0, transition: 'width 0.25s ease', overflow: 'hidden',
    }}>
      {/* Logo */}
      <div style={{ padding: compact ? '20px 0' : '20px 18px', borderBottom: '1px solid oklch(0.82 0.08 145)', display: 'flex', alignItems: 'center', gap: '10px', justifyContent: compact ? 'center' : 'flex-start' }}>
        <img src="assets/vaidyaa-logo.jpeg" alt="VAIDYAA AI" style={{ width: '32px', height: '32px', borderRadius: '8px', objectFit: 'cover', flexShrink: 0 }} />
        {!compact && (
          <div>
            <div style={{ fontSize: '14px', fontWeight: 800, color: 'var(--ink, oklch(0.18 0.02 145))', letterSpacing: '-0.01em' }}>VAIDYAA</div>
            <div style={{ fontSize: '10px', color: 'oklch(0.46 0.10 145)', fontFamily: 'var(--font-mono)', fontWeight: 600, letterSpacing: '0.08em' }}>AI PLATFORM</div>
          </div>
        )}
      </div>

      {/* Nav */}
      <nav style={{ flex: 1, padding: '12px 8px', display: 'flex', flexDirection: 'column', gap: '2px' }}>
        {NAV.map(item => {
          const isActive = active === item.id;
          return (
            <button key={item.id} onClick={() => onNavigate(item.id)}
              title={compact ? item.label : undefined}
              style={{
                display: 'flex', alignItems: 'center', gap: '10px',
                padding: compact ? '10px' : '9px 12px',
                justifyContent: compact ? 'center' : 'flex-start',
                borderRadius: '7px', border: 'none', cursor: 'pointer',
                background: isActive ? 'oklch(0.46 0.19 145)' : 'transparent',
                color: isActive ? '#fff' : 'oklch(0.32 0.12 145)',
                fontSize: '13px', fontWeight: isActive ? 700 : 500,
                transition: 'all 0.15s ease', width: '100%',
                borderLeft: isActive && !compact ? '2px solid oklch(0.46 0.19 145)' : '2px solid transparent',
              }}
              onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = 'oklch(0.46 0.19 145 / 0.12)'; e.currentTarget.style.color = 'oklch(0.32 0.12 145)'; } }}
              onMouseLeave={e => { e.currentTarget.style.background = isActive ? 'oklch(0.46 0.19 145)' : 'transparent'; e.currentTarget.style.color = isActive ? '#fff' : 'oklch(0.32 0.12 145)'; }}
            >
              <span style={{ fontSize: '16px', flexShrink: 0 }}>{item.icon}</span>
              {!compact && <span>{item.label}</span>}
            </button>
          );
        })}
      </nav>

      {/* Footer */}
      <div style={{ padding: compact ? '14px 8px' : '14px 16px', borderTop: '1px solid oklch(0.82 0.08 145)' }}>
        {!compact && (
          <div style={{ fontSize: '10px', color: 'oklch(0.40 0.10 145)', fontFamily: 'var(--font-mono)', lineHeight: 1.6 }}>
            v1.0.0 · API v1<br />
            <span style={{ color: 'oklch(0.46 0.19 145)' }}>● Online</span>
          </div>
        )}
        {compact && <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: 'oklch(0.46 0.19 145)', margin: '0 auto', boxShadow: '0 0 6px oklch(0.46 0.19 145)' }} />}
      </div>
    </aside>
  );
}

function Topbar({ page, onToggleCompact, compact }) {
  const pageInfo = NAV.find(n => n.id === page) || NAV[0];
  return (
    <header style={{
      height: '52px', borderBottom: '1px solid var(--border)',
      display: 'flex', alignItems: 'center', padding: '0 24px',
      justifyContent: 'space-between', background: 'var(--bg-surface)',
      position: 'sticky', top: 0, zIndex: 30, flexShrink: 0,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
        <button onClick={onToggleCompact} style={{
          background: 'transparent', border: 'none', cursor: 'pointer',
          color: 'var(--text-muted)', fontSize: '16px', padding: '4px', borderRadius: '4px',
        }}>☰</button>
        <div style={{ width: '1px', height: '16px', background: 'var(--border)' }} />
        <span style={{ fontSize: '13px', color: 'var(--text-muted)' }}>{pageInfo.icon}</span>
        <span style={{ fontSize: '14px', fontWeight: 700, color: 'var(--text-primary)' }}>{pageInfo.label}</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
          <div style={{ width: '7px', height: '7px', borderRadius: '50%', background: 'oklch(0.46 0.19 145)', boxShadow: '0 0 6px oklch(0.46 0.19 145)' }} />
          <span style={{ fontSize: '11px', color: 'var(--text-muted)', fontFamily: 'var(--font-mono)' }}>API ONLINE</span>
        </div>
        <div style={{ width: '1px', height: '16px', background: 'var(--border)' }} />
        <div style={{ padding: '5px 12px', background: 'oklch(0.75 0.14 60 / 0.12)', border: '1px solid oklch(0.75 0.14 60 / 0.3)', borderRadius: '5px' }}>
          <span style={{ fontSize: '11px', fontWeight: 700, color: 'oklch(0.75 0.14 60)' }}>⚕ Medical Disclaimer Active</span>
        </div>
      </div>
    </header>
  );
}

function App() {
  const [page, setPage] = useState('dashboard');
  const [compact, setCompact] = useState(false);
  const [tweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    // Tweaks panel protocol
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const [showTweaks, setShowTweaks] = useState(false);

  const pageMap = {
    dashboard: <Dashboard onNavigate={setPage} />,
    claim:     <ClaimVerifier />,
    report:    <ReportAnalyzer />,
    image:     <ImageAnalysis />,
    jobs:      <JobTracker />,
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      <Sidebar active={page} onNavigate={setPage} compact={compact} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <Topbar page={page} onToggleCompact={() => setCompact(c => !c)} compact={compact} />
        <main style={{ flex: 1, overflowY: 'auto', padding: '28px 32px', animation: 'fade-in 0.2s ease' }} key={page}>
          {pageMap[page]}
        </main>
      </div>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{
          position: 'fixed', bottom: '24px', right: '24px', zIndex: 100,
          background: 'var(--bg-surface)', border: '1px solid var(--border)',
          borderRadius: '12px', padding: '20px', width: '260px',
          boxShadow: '0 8px 40px rgba(0,0,0,0.5)',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '16px' }}>
            <span style={{ fontSize: '13px', fontWeight: 700, color: 'var(--text-primary)' }}>Tweaks</span>
            <button onClick={() => { setShowTweaks(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: '16px' }}>✕</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
            <div>
              <label style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: '6px' }}>Sidebar Mode</label>
              <div style={{ display: 'flex', gap: '6px' }}>
                {['Expanded', 'Compact'].map((v, i) => (
                  <button key={v} onClick={() => setCompact(i === 1)} style={{
                    flex: 1, padding: '7px', borderRadius: '6px', border: '1px solid var(--border)',
                    background: compact === (i === 1) ? 'oklch(0.70 0.13 195)' : 'var(--bg-elevated)',
                    color: compact === (i === 1) ? '#fff' : 'var(--text-secondary)',
                    fontSize: '12px', fontWeight: 600, cursor: 'pointer',
                  }}>{v}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: '6px' }}>Navigate To</label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                {NAV.map(n => (
                  <button key={n.id} onClick={() => { setPage(n.id); }}
                    style={{
                      padding: '7px 10px', borderRadius: '6px', border: '1px solid var(--border)',
                      background: page === n.id ? 'oklch(0.70 0.13 195 / 0.15)' : 'transparent',
                      color: page === n.id ? 'oklch(0.70 0.13 195)' : 'var(--text-secondary)',
                      fontSize: '12px', fontWeight: 600, cursor: 'pointer', textAlign: 'left',
                    }}>{n.icon} {n.label}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
